<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital EIA Presentations</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 820px;
      width: 100%;
    }
    h1 {
      font-size: 2.6rem;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    .eia-e { color: #00A4E0; }
    .eia-i { color: #0EB48D; }
    .eia-a { color: #81817F; }
    .subtitle {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 48px;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 640px;
      margin: 0 auto;
    }
    .item {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-align: left;
    }
    .item:hover {
      border-color: #00A4E0;
      transform: translateX(4px);
      box-shadow: -4px 0 0 0 #00A4E0;
    }
    .item-title {
      font-size: 1.05rem;
      font-weight: 500;
    }
    .item-lang {
      font-size: 0.85rem;
      color: #8b949e;
      font-weight: 400;
    }
    .item-arrow {
      color: #484f58;
      font-size: 1.2rem;
      transition: color 0.2s ease;
    }
    .item:hover .item-arrow { color: #00A4E0; }
    .footer {
      position: fixed;
      bottom: 16px;
      font-size: 0.8rem;
      color: #484f58;
    }

    .player {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .player.active { display: flex; }
    .player video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      z-index: 101;
      backdrop-filter: blur(8px);
    }
    .back-btn:hover { background: rgba(0, 0, 0, 0.85); }
  </style>
</head>
<body>

  <div class="container" id="selector">
    <h1>Digital <span class="eia-e">E</span><span class="eia-i">I</span><span class="eia-a">A</span> Presentations</h1>
    <p class="subtitle">Environmental Impact Assessment &times; Large Language Models</p>

    <div class="list" id="list"></div>

    <div class="footer">Click a title to play in fullscreen &middot; Press F for fullscreen &middot; ESC to exit</div>
  </div>

  <div class="player" id="player">
    <button class="back-btn" onclick="stopVideo()">&larr; Back</button>
    <video id="videoEl" controls></video>
  </div>

  <script>
    // Central catalog. Add new entries here as more presentations arrive.
    const RELEASE_BASE = 'https://github.com/kkhgeo/digital-eia-kr/releases/download/v1.0';
    const presentations = {
      'digital-eia-kr': {
        title: 'Digital EIA: Global Trends and Future Directions',
        language: 'Korean',
        file: 'Digital_EIA_Presentation_kr.mp4'
      },
      'digital-eia-uz': {
        title: 'Digital EIA: Global Trends and Future Directions',
        language: 'Uzbek',
        file: 'Digital_EIA_Presentation_uz.mp4'
      },
      'llm-eia-kr': {
        title: 'LLMs in Environmental Impact Assessment',
        language: 'Korean',
        file: `${RELEASE_BASE}/LLM_EIA_video_ko.mp4`
      },
      'llm-eia-uz': {
        title: 'LLMs in Environmental Impact Assessment',
        language: 'Uzbek',
        file: `${RELEASE_BASE}/LLM_EIA_video_uz.mp4`
      }
    };

    // Render list
    const listEl = document.getElementById('list');
    for (const [id, p] of Object.entries(presentations)) {
      const div = document.createElement('div');
      div.className = 'item';
      div.onclick = () => playVideo(id);
      div.innerHTML = `
        <div>
          <span class="item-title">${p.title}</span>
          <span class="item-lang"> (${p.language})</span>
        </div>
        <span class="item-arrow">&rarr;</span>`;
      listEl.appendChild(div);
    }

    function playVideo(id) {
      const entry = presentations[id];
      if (!entry) return;
      const video = document.getElementById('videoEl');
      const player = document.getElementById('player');
      const selector = document.getElementById('selector');

      video.src = entry.file;
      selector.style.display = 'none';
      player.classList.add('active');

      video.play().catch(() => {});
      if (player.requestFullscreen) {
        player.requestFullscreen().catch(() => {});
      }
    }

    function stopVideo() {
      const video = document.getElementById('videoEl');
      const player = document.getElementById('player');
      const selector = document.getElementById('selector');

      video.pause();
      video.src = '';
      player.classList.remove('active');
      selector.style.display = 'block';

      if (document.fullscreenElement) document.exitFullscreen();
      // Clear URL param if any
      if (window.location.search) {
        history.replaceState({}, '', window.location.pathname);
      }
    }

    document.addEventListener('keydown', (e) => {
      const video = document.getElementById('videoEl');
      if (e.key === 'f' || e.key === 'F') {
        if (document.fullscreenElement) document.exitFullscreen();
        else video.requestFullscreen();
      }
      if (e.key === 'Escape' && document.getElementById('player').classList.contains('active')) {
        stopVideo();
      }
    });

    // Auto-play if URL has ?v=<id>
    const params = new URLSearchParams(window.location.search);
    const vid = params.get('v');
    if (vid && presentations[vid]) {
      // Defer so fullscreen user-gesture rules are more forgiving on first interaction
      window.addEventListener('click', () => playVideo(vid), { once: true });
    }
  </script>
</body>
</html>
